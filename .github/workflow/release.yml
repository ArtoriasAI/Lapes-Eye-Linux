name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: "Lapes Eye"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake build-essential \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6opengl6-dev libqt6sql6-sqlite \
            libexiv2-dev libraw-dev \
            libgl1-mesa-dev libxkbcommon-dev libfuse2 \
            patchelf wget

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install into AppDir
        run: DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Download linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          QMAKE: /usr/bin/qmake6
          OUTPUT: LapesEye-${{ github.ref_name }}-x86_64.AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir ${{ github.workspace }}/AppDir \
            --plugin qt \
            --desktop-file ${{ github.workspace }}/AppDir/usr/share/applications/lapes-eye.desktop \
            --icon-file resources/icons/lapes-eye-256.png \
            --output appimage
          find . -maxdepth 1 -name "*.AppImage" \
            ! -name "linuxdeploy*" \
            -exec mv {} "${{ github.workspace }}/$OUTPUT" \;

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lape's Eye ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: LapesEye-${{ github.ref_name }}-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
